name: Release

# Triggered by pushing a tag of the form `v*` (e.g. `v0.1.0`). Builds
# the `polaris-dvc` CLI for Linux, macOS (Intel + Apple Silicon), and
# Windows, then attaches the tarballs/zips to a GitHub Release whose
# body is the matching section from CHANGELOG.md.
#
# Why tag-triggered (not manual `workflow_dispatch`): the tag is the
# canonical release identity. A human cuts a tag once, everything
# downstream — multi-OS build, artifact upload, Release creation —
# runs deterministically off it. Nothing in this workflow ever pushes
# back into the repo, so a re-run is safe.
#
# Bump / cut a release:
#   1. Update CHANGELOG.md — move [Unreleased] content into a new
#      `## [X.Y.Z] - YYYY-MM-DD` section.
#   2. Bump `version = "X.Y.Z"` in root Cargo.toml `[workspace.package]`.
#   3. `git commit -am "Release vX.Y.Z"`
#   4. `git tag -a vX.Y.Z -m "Release X.Y.Z"`
#   5. `git push && git push origin vX.Y.Z`
#
# Then this workflow fires.

on:
  push:
    tags:
      - "v*"

# Release creation needs `contents: write`. Everything else stays at
# the repo-default `read`.
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          # No x86_64-apple-darwin: `macos-13` runner queue times are
          # unpredictable (often 10-30 min, occasionally 1h+) since
          # GitHub reduced Intel-macOS runner capacity post-transition
          # to Apple Silicon. Rosetta 2 is universal on Intel Mac
          # hardware running macOS 14+ and runs the aarch64 binary
          # transparently — startup overhead is negligible for a
          # one-shot CLI. The install snippet below tells Intel Mac
          # users to grab the aarch64 archive.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build polaris-dvc (release)
        run: cargo build --release --locked -p polaris-dvc-cli --target ${{ matrix.target }}

      # Stage the binary + LICENSE/NOTICE/README/CHANGELOG under a
      # workspace-relative `dist-stage/<name>/` directory. Workspace-
      # relative (not $TMP / mktemp) so path conventions are identical
      # on Linux, macOS, and Windows Git Bash — the previous
      # `mktemp -d` version emitted `/tmp/tmp.XXX/...` POSIX paths
      # that `actions/upload-artifact` couldn't resolve on Windows.
      - name: Stage files
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          target="${{ matrix.target }}"
          name="polaris-dvc-v${version}-${target}"
          mkdir -p "dist-stage/${name}" dist

          if [[ "${{ matrix.os }}" == windows-latest ]]; then
              cp "target/${target}/release/polaris-dvc.exe" "dist-stage/${name}/"
          else
              cp "target/${target}/release/polaris-dvc" "dist-stage/${name}/"
          fi
          cp LICENSE NOTICE README.md CHANGELOG.md "dist-stage/${name}/"

          ls -la "dist-stage/${name}/"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      # Archive creation is split by platform so we use each runner's
      # native tool: `tar` on POSIX (always available, produces
      # deterministic gzip), `Compress-Archive` on Windows (a real
      # PowerShell cmdlet that knows Windows path semantics — no bash
      # ↔ pwsh path translation in the loop).
      - name: Archive (tar.gz, POSIX)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          name="${{ steps.stage.outputs.name }}"
          tar -C dist-stage -czf "dist/${name}.tar.gz" "${name}"
          ls -la "dist/${name}.tar.gz"

      - name: Archive (zip, Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "${{ steps.stage.outputs.name }}"
          Compress-Archive -Path "dist-stage/$name" -DestinationPath "dist/$name.zip"
          Get-Item "dist/$name.zip" | Format-List FullName, Length

      - name: Upload staged archive for the release job
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.stage.outputs.name }}
          path: dist/${{ steps.stage.outputs.name }}.*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all staged archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List archives
        run: ls -la dist/

      - name: Extract release notes for this tag from CHANGELOG.md
        id: notes
        # Pull out the section whose header matches `## [<version>]`,
        # stopping at the next `##` header. If no match, emit a
        # single-line placeholder so the release body isn't empty.
        # Then prepend a short install snippet — more useful to
        # drive-by readers arriving at the Release page than the raw
        # changelog alone.
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes_file="$(mktemp)"
          awk -v v="${version}" '
            $0 ~ ("^## \\[" v "\\]") { inside = 1; next }
            inside && /^## \[/ { exit }
            inside { print }
          ' CHANGELOG.md > "$notes_file"
          if [[ ! -s "$notes_file" ]]; then
              echo "See [CHANGELOG.md](CHANGELOG.md) for details." > "$notes_file"
          fi
          {
            printf '## Install\n\n'
            printf 'Download the archive for your platform from the assets below, extract it, '
            printf 'and place `polaris-dvc` somewhere on your `PATH`. The archive also ships '
            printf '`LICENSE`, `NOTICE`, `README.md`, and `CHANGELOG.md`.\n\n'
            printf '| Platform | Archive |\n'
            printf '|---|---|\n'
            printf '| Linux (x86_64) | `polaris-dvc-%s-x86_64-unknown-linux-gnu.tar.gz` |\n' "${tag}"
            printf '| macOS (Apple Silicon, M1+) | `polaris-dvc-%s-aarch64-apple-darwin.tar.gz` |\n' "${tag}"
            printf '| macOS (Intel) | Use the Apple Silicon archive — Rosetta 2 runs it transparently. |\n'
            printf '| Windows (x86_64) | `polaris-dvc-%s-x86_64-pc-windows-msvc.zip` |\n\n' "${tag}"
            printf 'Building from source:\n\n'
            printf '```sh\n'
            printf 'cargo install --git https://github.com/PolarisOffice/polaris_dvc --tag %s polaris-dvc-cli\n' "${tag}"
            printf '```\n\n---\n\n'
            cat "$notes_file"
          } > release-body.md
          echo "body_path=$(pwd)/release-body.md" >> "$GITHUB_OUTPUT"
          echo "--- release body ---"
          cat release-body.md

      # SHA-pinned to the v3 tag. Same rationale as ci.yml's wasm-pack
      # pin: guards against upstream tag retargeting.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.body_path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
