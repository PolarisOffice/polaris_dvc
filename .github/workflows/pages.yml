name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Grants required for the official GitHub Pages deploy flow
# (see actions/deploy-pages). `id-token: write` is needed for the
# signed OIDC handshake the action performs with the Pages service.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow at most one Pages deploy running at a time, but don't cancel
# an in-flight production deploy — finish it so the site doesn't
# get stuck in a half-deployed state.
concurrency:
  group: pages
  cancel-in-progress: false

# Keep this in sync with `.github/workflows/ci.yml` so CI and the
# deployed demo always ship the same wasm-pack artifact.
env:
  WASM_PACK_VERSION: "0.14.0"

jobs:
  build:
    name: Build + stage site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # See ci.yml for the rationale behind this pinning pattern.
      - name: Install wasm-pack (SHA-pinned action)
        uses: taiki-e/install-action@74e87cbfa15a59692b158178d8905a61bf6fca95 # v2.75.20
        with:
          tool: wasm-pack@${{ env.WASM_PACK_VERSION }}

      - name: Build polaris-dvc-wasm
        run: wasm-pack build crates/polaris-dvc-wasm --target web --out-name polaris_dvc

      - name: Assemble site/
        # Flatten the demo into a self-contained static bundle:
        #   site/index.html
        #   site/app.js       (import path rewritten to ./pkg/)
        #   site/pkg/polaris_dvc.js
        #   site/pkg/polaris_dvc_bg.wasm
        #   site/golden/<case>/{doc.hwpx,spec.json,expected.json,expected.xml}
        #   site/golden/manifest.json   (case list for the UI's preset menu)
        # The local-dev layout uses `../../crates/.../pkg/` which only works
        # when the server is run from the repo root; this rewrite makes the
        # deployed site work from any path.
        run: |
          set -euxo pipefail
          mkdir -p site/pkg
          cp examples/web/index.html site/
          cp examples/web/app.js site/
          cp crates/polaris-dvc-wasm/pkg/polaris_dvc.js site/pkg/
          cp crates/polaris-dvc-wasm/pkg/polaris_dvc_bg.wasm site/pkg/
          sed -i 's|\.\./\.\./crates/polaris-dvc-wasm/pkg/polaris_dvc\.js|./pkg/polaris_dvc.js|' site/app.js
          # Sanity: confirm the rewrite landed.
          grep -F './pkg/polaris_dvc.js' site/app.js

          # Golden fixtures: expose each case as a browsable triplet so
          # the web UI can offer a "load golden case" preset. The
          # manifest.json file (generated + committed by the
          # `golden_cases` test — see `crates/polaris-dvc-core/tests/
          # golden.rs::write_manifest`) ships as-is alongside the cases.
          mkdir -p site/golden
          cp -R testdata/golden/* site/golden/
          echo "Manifest entries: $(jq length site/golden/manifest.json)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v5
