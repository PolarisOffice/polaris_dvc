name: DVC parity (Windows)

# Build upstream hancom-io/dvc on a Windows runner, run the binary
# against every fixture under `testdata/golden/`, and publish the
# binary set as a reusable artifact.
#
# The build recipe combines several upstream-repro fixes. Even with
# jsoncpp rebuilt from source and path rewrites applied (runs #15-#22),
# every args-bearing invocation crashed with 0xC0000005 while the
# no-args smoke test printed "Hello World!" cleanly. Deep investigation
# of the upstream sources turned up a DVCModel.vcxproj defect:
#
#   export/export.h declares:    #ifdef DVC_EXPORTS  →  __declspec(dllexport)
#                                #else                →  __declspec(dllimport)
#   DVCModel.vcxproj defines:    DVCMODEL_EXPORTS   (*not* DVC_EXPORTS)
#
# So in the DLL build, `createDVC`/`deleteDVC` are declared *dllimport*
# inside their own DLL — MSVC emits warning C4273 and the export table
# is unreliable. This run patches the vcxproj to define `DVC_EXPORTS`
# *in addition to* the legacy `DVCMODEL_EXPORTS` and adds probe steps
# (`-h`, `-j`, bogus paths) plus `dumpbin /exports DVCModel.dll` so we
# can *see* which arg-shape crashes and whether the symbols are
# actually exported.
#
# Why not x64 or v141: upstream's Release|x64 ItemDefinitionGroup is
# literally empty (no AdditionalIncludeDirectories at all) and
# OWPMLApi.vcxproj's x64 configs are likewise incomplete — upstream
# devs apparently don't build x64 despite what the README says.
# v141 toolset install via VS Installer fails on windows-latest
# (exit 1, no actionable diagnostic). Sticking with Win32 + v143 +
# the OWPML PCH compat shim keeps us on well-trodden ground.

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream hancom-io/dvc ref (branch/tag/SHA)"
        default: "main"
        required: false
      reuse_artifact_from_run:
        description: "Skip build and reuse binary from this run ID (90-day retention). Leave empty for a fresh build."
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - ".github/workflows/dvc-parity.yml"
      - "scripts/parity-windows.ps1"
      - "scripts/diff-dvc-outputs.sh"

permissions:
  contents: read
  actions: read   # needed to pull artifacts from prior runs via download-artifact@v4

jobs:
  build:
    name: Build DVC binary set (Release / Win32 / v143)
    runs-on: windows-latest
    # Skip the ~7-minute build when the user points `reuse_artifact_from_run`
    # at a prior run. The parity job then downloads from that run_id instead.
    if: ${{ inputs.reuse_artifact_from_run == '' }}
    env:
      UPSTREAM_REF: ${{ inputs.upstream_ref || 'main' }}
    outputs:
      artifact_name: ${{ steps.publish.outputs.artifact_name }}
    steps:
      - name: Checkout upstream hancom-io/dvc
        uses: actions/checkout@v4
        with:
          repository: hancom-io/dvc
          ref: ${{ env.UPSTREAM_REF }}
          path: dvc

      - name: Fetch OSS dependencies (hwpx-owpml-model, rapidjson, jsoncpp)
        shell: bash
        # Replicates upstream's `update_oss.bat` minus (1) the GitHub
        # token argument and (2) a typo at line 58 (`cd rapidjson`
        # where it meant `cd jsoncpp`) that silently leaves jsoncpp
        # unpinned. We take jsoncpp at HEAD, matching upstream's
        # effective behavior.
        run: |
          set -euo pipefail
          cd dvc
          mkdir -p opensource
          cd opensource
          echo "::group::hwpx-owpml-model"
          git clone --depth 1 https://github.com/hancom-io/hwpx-owpml-model.git
          echo "::endgroup::"
          echo "::group::rapidjson"
          git clone https://github.com/Tencent/rapidjson.git
          git -C rapidjson reset --hard 8261c1ddf43f10de00fd8c9a67811d1486b2c784
          echo "::endgroup::"
          echo "::group::jsoncpp"
          git clone --depth 1 https://github.com/open-source-parsers/jsoncpp.git
          echo "::endgroup::"

      - name: Disable stdafx PCH in OWPML vcxprojs (v143 compat shim)
        shell: bash
        # OWPML's sub-project vcxprojs were authored against v141,
        # which auto-recognized `stdafx.h` as the PCH entry point.
        # v143 defaults `PrecompiledHeaderFile` to `pch.h` and
        # produces C1010 ("unexpected end of file while looking for
        # precompiled header") for every OWPML source. Flip the PCH
        # setting to NotUsing for the OWPML subprojects only —
        # DVCModel itself uses pch.h natively and is left alone.
        run: |
          set -euo pipefail
          cd dvc/opensource/hwpx-owpml-model
          find . -name '*.vcxproj' -print0 | while IFS= read -r -d '' p; do
              if grep -q 'PrecompiledHeader' "$p"; then
                  sed -i \
                    -e 's|<PrecompiledHeader>Use</PrecompiledHeader>|<PrecompiledHeader>NotUsing</PrecompiledHeader>|g' \
                    -e 's|<PrecompiledHeader>Create</PrecompiledHeader>|<PrecompiledHeader>NotUsing</PrecompiledHeader>|g' \
                    "$p"
                  echo "patched: $p"
              fi
          done

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Detect installed Windows SDK
        id: sdk
        shell: pwsh
        run: |
          $root = 'C:\Program Files (x86)\Windows Kits\10\Include'
          if (!(Test-Path $root)) { $root = 'C:\Program Files\Windows Kits\10\Include' }
          $versions = Get-ChildItem $root -Directory |
            Where-Object { $_.Name -match '^10\.' } |
            Sort-Object Name -Descending
          if ($null -eq $versions -or $versions.Count -eq 0) {
            throw "No Windows 10 SDK found under $root"
          }
          $ver = $versions[0].Name
          Write-Host "Using Windows SDK: $ver"
          "ver=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build pinned jsoncpp as shared DLL (Win32 / Release / v143)
        shell: pwsh
        # Upstream README walks through:
        #   `cmake CMakeLists.txt -B json_git -G "Visual Studio 15 2017 Win64"`
        #   → open jsoncpp.sln → build `jsoncpp_lib` → confirm
        #     jsoncpp.dll + lib.
        # We swap Win64 for Win32 (matches the Platform=x86 msbuild
        # later) and target VS2022's v143 generator (v141 isn't
        # installable on windows-latest). BUILD_SHARED_LIBS=ON emits
        # both the import lib and a runtime DLL — the DLL goes next
        # to ExampleWindows.exe during the stage step below; the
        # import lib feeds DVCModel's Release|Win32 link step via
        # the vcxproj's `./opensource/jsoncpp/json_git/lib/Release`
        # AdditionalLibraryDirectories (populated by the copy at the
        # end of this step).
        run: |
          Push-Location dvc\opensource\jsoncpp
          cmake -G "Visual Studio 17 2022" -A Win32 -B json_git `
                -DJSONCPP_WITH_TESTS=OFF `
                -DJSONCPP_WITH_POST_BUILD_UNITTEST=OFF `
                -DBUILD_SHARED_LIBS=ON `
                -DJSONCPP_STATIC_WINDOWS_RUNTIME=OFF
          cmake --build json_git --config Release
          Write-Host "--- jsoncpp build outputs ---"
          Get-ChildItem -Recurse -Path json_git -Include *.dll,*.lib |
            Select-Object FullName, Length |
            Format-Table -AutoSize
          # Stage the import lib at the exact path DVCModel.vcxproj
          # expects (`./opensource/jsoncpp/json_git/lib/Release/
          # jsoncpp.lib`) regardless of where CMake wrote it.
          $target = Join-Path (Get-Location).Path 'json_git\lib\Release\jsoncpp.lib'
          New-Item -ItemType Directory -Force -Path 'json_git\lib\Release' | Out-Null
          if (-not (Test-Path $target)) {
            $src = Get-ChildItem -Path json_git -Recurse -Filter '*.lib' |
              Where-Object { $_.Name -match 'jsoncpp' } |
              Select-Object -First 1
            if (-not $src) { throw "jsoncpp.lib not found after CMake build" }
            Write-Host "Staging import lib: $($src.FullName) -> $target"
            Copy-Item $src.FullName $target -Force
          } else {
            Write-Host "jsoncpp.lib already at target: $target"
          }
          Get-ChildItem 'json_git\lib\Release' | Format-Table -AutoSize
          Pop-Location

      - name: Patch DVCModel.vcxproj (jsoncpp paths + DVC_EXPORTS define)
        shell: pwsh
        # TWO distinct patches in one step so we only rewrite the file once:
        #
        # 1) Swap the vcpkg jsoncpp paths back to the `./opensource/jsoncpp/...`
        #    source-build layout. Upstream's Debug|Win32 references the
        #    source-build paths; Release|Win32 and Debug|x64 were later
        #    patched to `./opensource/vcpkg/packages/jsoncpp_x86-windows/...`
        #    (a private dev layout that CI can't populate).
        #
        # 2) Add `DVC_EXPORTS` to every PreprocessorDefinitions block.
        #    `export/export.h` gates `__declspec(dllexport)` on DVC_EXPORTS,
        #    but the upstream vcxproj only defines `DVCMODEL_EXPORTS`, so
        #    `createDVC`/`deleteDVC` are declared dllimport inside their
        #    own DLL (MSVC warning C4273, unreliable export table). The
        #    legacy `DVCMODEL_EXPORTS` is preserved in case some header
        #    we don't see still references it — we just *add* DVC_EXPORTS.
        run: |
          $vcxproj = 'dvc\DVCModel.vcxproj'
          $text = Get-Content $vcxproj -Raw
          $text = $text.Replace('./opensource/vcpkg/packages/jsoncpp_x86-windows/include/json', `
                                './opensource/jsoncpp/include/json')
          $text = $text.Replace('./opensource/vcpkg/packages/jsoncpp_x86-windows/lib', `
                                './opensource/jsoncpp/json_git/lib/Release')
          # Prepend DVC_EXPORTS to every DVCMODEL_EXPORTS occurrence.
          # Idempotent: matches only `DVCMODEL_EXPORTS;` not already
          # preceded by `DVC_EXPORTS;`.
          $text = [regex]::Replace(
              $text,
              '(?<!DVC_EXPORTS;)DVCMODEL_EXPORTS;',
              'DVC_EXPORTS;DVCMODEL_EXPORTS;')
          Set-Content -Path $vcxproj -Value $text -NoNewline
          Write-Host "--- AdditionalIncludeDirectories / AdditionalLibraryDirectories after rewrite ---"
          Select-String -Path $vcxproj -Pattern 'AdditionalIncludeDirectories|AdditionalLibraryDirectories' |
            ForEach-Object { Write-Host "  $($_.Line.Trim())" }
          Write-Host "--- PreprocessorDefinitions after rewrite ---"
          Select-String -Path $vcxproj -Pattern 'PreprocessorDefinitions' |
            ForEach-Object { Write-Host "  $($_.Line.Trim())" }

      - name: Build DVCModel.sln (Release / Win32 / v143)
        shell: cmd
        # Platform=x86 at the solution level → Win32 at the vcxproj
        # level. This config is the only one upstream has a complete
        # AdditionalIncludeDirectories set for across every sub-
        # project; it's also the combo that built cleanly in run #15
        # (before the vcpkg ABI issue took over at runtime).
        run: |
          cd dvc
          msbuild DVCModel.sln ^
            /p:Configuration=Release ^
            /p:Platform=x86 ^
            /p:PlatformToolset=v143 ^
            /p:WindowsTargetPlatformVersion=${{ steps.sdk.outputs.ver }} ^
            /m /v:minimal

      - name: Locate build output
        id: locate
        shell: pwsh
        run: |
          $exeItem = Get-ChildItem -Path dvc -Recurse -Filter ExampleWindows.exe -File |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $exeItem) { throw "ExampleWindows.exe not found after build" }
          $dllItem = Get-ChildItem -Path dvc -Recurse -Filter DVCModel.dll -File |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $dllItem) { throw "DVCModel.dll not found after build" }
          $stageDir = Split-Path -Parent $exeItem.FullName
          Write-Host "stage dir: $stageDir"
          Write-Host "exe:       $($exeItem.FullName)"
          Write-Host "dll:       $($dllItem.FullName)"
          "stage_dir=$stageDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "exe_path=$($exeItem.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Stage jsoncpp.dll next to ExampleWindows.exe
        shell: pwsh
        run: |
          $stage = "${{ steps.locate.outputs.stage_dir }}"
          $src = Get-ChildItem -Path dvc\opensource\jsoncpp\json_git -Recurse `
                               -Filter jsoncpp.dll -File |
                 Select-Object -First 1
          if (-not $src) { throw "jsoncpp.dll not found — shared-lib build must have failed" }
          Copy-Item $src.FullName $stage -Force
          Write-Host "staged: $($src.FullName) -> $stage"
          Write-Host "---"
          Write-Host "Final $stage contents:"
          Get-ChildItem $stage | Select-Object Name, Length | Format-Table -AutoSize

      - name: Inspect DLL dependency tree + DVCModel.dll exports (dumpbin)
        shell: pwsh
        # `dumpbin /exports DVCModel.dll` is the diagnostic that tells
        # us whether the export-macro fix (DVC_EXPORTS) actually took
        # effect. If `createDVC` and `deleteDVC` show up in the export
        # table, the fix worked; if not, the DLL is still broken and
        # args-bearing invocations will keep crashing.
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $dumpbin = & $vswhere -latest -find 'VC\Tools\MSVC\*\bin\Hostx64\x86\dumpbin.exe' | Select-Object -First 1
          if (-not $dumpbin) {
            Write-Host "dumpbin not found; skipping dependency inspection"
            return
          }
          Write-Host "dumpbin: $dumpbin"
          $stage = "${{ steps.locate.outputs.stage_dir }}"
          foreach ($f in @("ExampleWindows.exe", "DVCModel.dll", "jsoncpp.dll")) {
            $p = Join-Path $stage $f
            if (Test-Path $p) {
              Write-Host "::group::$f dependencies"
              & $dumpbin /dependents $p
              Write-Host "::endgroup::"
            }
          }
          $dllPath = Join-Path $stage 'DVCModel.dll'
          if (Test-Path $dllPath) {
            Write-Host "::group::DVCModel.dll /exports"
            & $dumpbin /exports $dllPath
            Write-Host "::endgroup::"
          }

      - name: Probe 0 — no args (expect Hello World + exit 0)
        shell: cmd
        continue-on-error: true
        # Baseline: we've confirmed this succeeds in prior runs. If it
        # fails here, something upstream of argv parsing broke.
        run: |
          echo --- probe 0: no args ---
          "${{ steps.locate.outputs.exe_path }}"
          echo exit_code=%errorlevel%

      - name: Probe 1 — `-h` only (argv parsing, no file I/O)
        shell: cmd
        continue-on-error: true
        # `-h` hits `parsingShortOption` → `setErrorMessage(Help)` and
        # `commandParsing` returns false. `setCommand` returns the help
        # text; `doValidationCheck` is NEVER called. If this crashes,
        # the bug is in wstring handling / CommandParser internals.
        # If this prints help and exits cleanly, the bug is downstream
        # (doValidationCheck / Checker / OWPMLReader).
        run: |
          echo --- probe 1: -h only ---
          "${{ steps.locate.outputs.exe_path }}" -h
          echo exit_code=%errorlevel%

      - name: Probe 2 — `-j` only (one short option, no files)
        shell: cmd
        continue-on-error: true
        # Sets Format=JSON then commandParsing returns successfully
        # (m_message is empty because no error was set). Then
        # doValidationCheck proceeds with EMPTY dvcFilepath &
        # targetFilepath. Util::getAbsolutePath("") hits an edge case —
        # if that crashes, the bug is in Util::getAbsolutePath.
        # If DVC prints "Json 파일이 잘못되었습니다" and exits cleanly,
        # that path is fine.
        run: |
          echo --- probe 2: -j only ---
          "${{ steps.locate.outputs.exe_path }}" -j
          echo exit_code=%errorlevel%

      - name: Probe 3 — bogus paths (reaches doValidationCheck, files missing)
        shell: cmd
        continue-on-error: true
        # argv parse succeeds → filepaths are set → Util::getAbsolutePath
        # is called on files that definitely don't exist →
        # doValidationCheck should print an error and return false
        # gracefully, WITHOUT constructing a Checker. If this crashes,
        # Util::getAbsolutePath has a problem with non-existent paths
        # on Windows.
        run: |
          echo --- probe 3: bogus paths ---
          "${{ steps.locate.outputs.exe_path }}" -j C:\nope\bogus.json C:\nope\bogus.hwpx
          echo exit_code=%errorlevel%

      - name: Publish binary artifact
        id: publish
        uses: actions/upload-artifact@v4
        with:
          name: dvc-windows-x86-${{ github.run_id }}
          path: ${{ steps.locate.outputs.stage_dir }}/**
          retention-days: 90
          if-no-files-found: error

      - name: Set artifact output
        shell: bash
        run: echo "artifact_name=dvc-windows-x86-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-logs-${{ github.run_id }}
          path: |
            dvc/**/*.log
            dvc/**/BuildLog.htm
          if-no-files-found: ignore

  parity:
    name: Run DVC against golden fixtures
    needs: build
    # `always()` lets parity proceed even when build is SKIPPED via
    # `reuse_artifact_from_run`. We still need to bail if build ran
    # and FAILED, so gate explicitly on non-failure.
    if: ${{ always() && needs.build.result != 'failure' && needs.build.result != 'cancelled' }}
    runs-on: windows-latest
    steps:
      - name: Checkout polaris
        uses: actions/checkout@v4

      - name: Resolve artifact source (fresh build vs reused run)
        id: art
        shell: bash
        # Two modes:
        #   fresh build  -> artifact name from build job's output,
        #                   run_id = this run's id
        #   reused run   -> artifact name follows the same template
        #                   we use in the upload step of the build job
        #                   (`dvc-windows-x86-<run_id>`); run_id is
        #                   the one the user passed.
        run: |
          set -euo pipefail
          reuse='${{ inputs.reuse_artifact_from_run }}'
          if [[ -n "$reuse" ]]; then
              name="dvc-windows-x86-${reuse}"
              run_id="$reuse"
              echo "mode=reuse (run $run_id)"
          else
              name='${{ needs.build.outputs.artifact_name }}'
              run_id='${{ github.run_id }}'
              echo "mode=fresh build (run $run_id)"
          fi
          echo "artifact_name=$name" >> "$GITHUB_OUTPUT"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download DVC binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.art.outputs.artifact_name }}
          path: dvc-bin
          # `run-id` + `github-token` together let us pull from ANY
          # prior run's artifact in this repo (subject to retention).
          # When `run-id` equals the current run, this behaves the
          # same as omitting both fields.
          run-id: ${{ steps.art.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifact contents
        shell: pwsh
        run: Get-ChildItem -Recurse dvc-bin | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Probe 4 — real Hancom Docs HWPX (decisive test)
        shell: pwsh
        continue-on-error: true
        # The #23 probe ladder proved the binary itself is healthy:
        # argv parsing, commandParsing, doValidationCheck entry, and
        # Util::getAbsolutePath(nonexistent) all return cleanly with
        # exit 0. The crash happens ONLY after getAbsolutePath succeeds,
        # i.e. inside Checker::Initialize → OWPMLReader reading real
        # HWPX bytes. That narrows the question to: does OWPMLReader
        # crash on *every* HWPX or specifically on our synthetic
        # fixture bytes?
        #
        # Three invocations against real Hancom Docs saves
        # (`testdata/real-samples/`):
        #   4a. empty.hwpx — ASCII filename, truly empty doc. This is
        #       the *primary* diagnostic: does upstream parse ANY real
        #       HWPX? Minimum content to reduce variable surface.
        #   4b. 테스트.hwpx — Korean filename, document with text. If
        #       4a OK and this crashes, either Korean filenames trip
        #       path handling, or text content (vs empty) matters.
        #   4c. 테스트.hwpx copied to ASCII — isolates filename vs
        #       content: if 4c OK and 4b crashes, the Korean path is
        #       the trigger.
        #
        # Expected outcomes:
        #   4a OK → our synthetic fixture XML is the root cause of
        #           every prior 0xC0000005. Next step: diff our
        #           fixture HWPX against these real HWPX structures,
        #           find the strict requirement.
        #   4a crash → upstream OWPMLReader (or hwpx-owpml-model
        #           linkage) is broken in our CI build itself. Next
        #           step: Debug-config build + symbols.
        run: |
          $exeItem = Get-ChildItem -Path dvc-bin -Recurse -Filter ExampleWindows.exe | Select-Object -First 1
          if (-not $exeItem) { throw "ExampleWindows.exe not found" }
          $exe = $exeItem.FullName
          Write-Host "using: $exe"

          $outDir = "testdata\golden\_dvc-output"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          # Trivial empty-rules spec — upstream accepts `{}` (spec
          # parse is JSON-tolerant; empty rule set means "no rules to
          # run, just parse the HWPX and emit empty violations list").
          $trivSpec = Join-Path $outDir 'trivial-spec.json'
          '{}' | Out-File -FilePath $trivSpec -Encoding ascii -NoNewline

          $empty    = 'testdata\real-samples\empty.hwpx'
          $korean   = 'testdata\real-samples\테스트.hwpx'
          $koreanAs = Join-Path $outDir 'test-ascii.hwpx'
          Copy-Item $korean $koreanAs -Force

          function Invoke-Probe {
              param([string]$label, [string]$doc, [string]$outJson)
              Write-Host "::group::$label"
              Write-Host "  doc:  $doc"
              Write-Host "  size: $((Get-Item $doc).Length) bytes"
              & $exe -j -o "--file=$outJson" $trivSpec $doc 2>&1 | ForEach-Object { Write-Host "  > $_" }
              Write-Host "  exit_code=$LASTEXITCODE"
              if (Test-Path $outJson) {
                  Write-Host "  --- OUTPUT PRODUCED ---"
                  Get-Content $outJson | ForEach-Object { Write-Host "  $_" }
              } else {
                  Write-Host "  (no output file produced)"
              }
              Write-Host "::endgroup::"
          }

          Invoke-Probe "probe 4a - empty.hwpx (ASCII path, empty doc)" `
                       $empty    (Join-Path $outDir 'probe4a.json')
          Invoke-Probe "probe 4b - 테스트.hwpx (Korean path, has text)" `
                       $korean   (Join-Path $outDir 'probe4b.json')
          Invoke-Probe "probe 4c - 테스트.hwpx copied to ASCII path" `
                       $koreanAs (Join-Path $outDir 'probe4c.json')

      - name: Single-fixture probe (cmd.exe, 01_clean)
        shell: cmd
        continue-on-error: true
        # Upstream flag semantics (from CommandParser.cpp::parsingShortOption):
        #   -j → FormatJSON     -o → AllOption output (ALL conditional fields)
        # The DVC spec and HWPX paths are *positional* args (first non-flag
        # → m_dvcFilepath, second → m_targetFilepath). `-t` is NOT a flag
        # that consumes a value — it's SetOutputOption(Table), which would
        # emit a different (smaller) field set and fail our byte-diff.
        # Our golden expected.json files are rendered under AllOption
        # (CLAUDE.md §3), so we match with `-o`.
        run: |
          for /f "delims=" %%X in ('dir /b /s "dvc-bin\ExampleWindows.exe"') do set EXE=%%X
          echo using: %EXE%
          set DOC=testdata\golden\01_clean\doc.hwpx
          set SPEC=testdata\golden\01_clean\spec.json
          set OUT=testdata\golden\_dvc-output\01_clean.probe.json
          mkdir testdata\golden\_dvc-output 2>nul
          echo --- running with args ---
          "%EXE%" -j -o "--file=%OUT%" "%SPEC%" "%DOC%"
          echo exit_code=%errorlevel%
          if exist "%OUT%" (echo --- output file produced --- & type "%OUT%") else (echo no output file)

      - name: Run DVC against each golden fixture
        shell: pwsh
        run: |
          $exeItem = Get-ChildItem -Path dvc-bin -Recurse -Filter ExampleWindows.exe | Select-Object -First 1
          if (-not $exeItem) { throw "ExampleWindows.exe not found under dvc-bin/" }
          $exe = $exeItem.FullName
          Write-Host "Using exe: $exe"
          $outDir = "testdata\golden\_dvc-output"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          $cases = Get-ChildItem "testdata\golden" -Directory |
            Where-Object { $_.Name -ne "_dvc-output" -and (Test-Path (Join-Path $_.FullName "doc.hwpx")) }
          Write-Host "Processing $($cases.Count) fixtures"
          foreach ($case in $cases) {
            $name = $case.Name
            $doc = Join-Path $case.FullName "doc.hwpx"
            $spec = Join-Path $case.FullName "spec.json"
            $out = Join-Path $outDir "$name.json"
            Write-Host "::group::$name"
            # `-o` = AllOption (all conditional fields); spec + doc positional.
            $combined = & $exe -j -o "--file=$out" $spec $doc 2>&1
            $rc = $LASTEXITCODE
            Write-Host "exit_code=$rc"
            if ($combined) { Write-Host "--- output ---"; $combined | ForEach-Object { Write-Host $_ } }
            if (Test-Path $out) {
              Write-Host "--- output.json ---"
              Get-Content $out
            } else {
              Write-Host "(no output.json produced)"
            }
            Write-Host "::endgroup::"
          }

      - name: Soft-diff DVC output vs committed expected.json
        shell: bash
        continue-on-error: true
        run: |
          bash scripts/diff-dvc-outputs.sh testdata/golden testdata/golden/_dvc-output \
            | tee testdata/golden/_dvc-output/_diff-summary.txt

      - name: Upload DVC outputs + per-fixture logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dvc-parity-outputs-${{ github.run_id }}
          path: testdata/golden/_dvc-output/
          if-no-files-found: warn
