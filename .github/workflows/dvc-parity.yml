name: DVC parity (Windows)

# Builds upstream `hancom-io/dvc` on a Windows runner, publishes the
# resulting binary set as a reusable artifact, and runs the binary
# against every fixture under `testdata/golden/`.
#
# Two jobs:
#   build  — compiles DVCModel.dll + ExampleWindows.exe, stages runtime
#            DLLs, uploads the whole kit as `dvc-windows-x86-<run_id>`.
#            Useful on its own even when parity verification is offline:
#            downstream consumers (or humans without Windows) can pull
#            this artifact instead of building from source.
#   parity — downloads the artifact and runs DVC.exe against each
#            fixture, capturing stdout/stderr/exit-code per invocation,
#            and soft-diffing the outputs against committed expected.json.
#
# Historical note: prior iterations of this workflow had
# `continue-on-error: true` at the job level, which masked runtime
# failures as green — the build was actually succeeding since commit
# #TODO but the binary exited silently for every fixture. Failures now
# surface. See `docs/dvc-parity-status.md` for the diagnostic timeline.

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream hancom-io/dvc ref to build (branch/tag/SHA)"
        default: "main"
        required: false
  # Triggered on workflow/script changes so artifact stays fresh.
  push:
    branches: [main]
    paths:
      - ".github/workflows/dvc-parity.yml"
      - "scripts/parity-windows.ps1"
      - "scripts/diff-dvc-outputs.sh"

permissions:
  contents: read

jobs:
  build:
    name: Build DVC binary set
    runs-on: windows-latest
    env:
      UPSTREAM_REF: ${{ inputs.upstream_ref || 'main' }}
    outputs:
      artifact_name: ${{ steps.publish.outputs.artifact_name }}
    steps:
      - name: Checkout upstream hancom-io/dvc
        uses: actions/checkout@v4
        with:
          repository: hancom-io/dvc
          ref: ${{ env.UPSTREAM_REF }}
          path: dvc

      - name: Fetch OSS dependencies
        shell: bash
        # Replicates upstream `update_oss.bat` but clones without a PAT
        # (the bat wraps them with a token solely to work around
        # corporate network policies). Also fixes the bat's bug where
        # the jsoncpp reset runs inside the rapidjson directory.
        run: |
          set -euo pipefail
          cd dvc
          mkdir -p opensource
          cd opensource
          echo "::group::hwpx-owpml-model"
          git clone --depth 1 https://github.com/hancom-io/hwpx-owpml-model.git
          echo "::endgroup::"
          echo "::group::rapidjson"
          git clone https://github.com/Tencent/rapidjson.git
          git -C rapidjson reset --hard 8261c1ddf43f10de00fd8c9a67811d1486b2c784
          echo "::endgroup::"
          echo "::group::jsoncpp"
          git clone https://github.com/open-source-parsers/jsoncpp.git
          git -C jsoncpp reset --hard 8190e061bc2d95da37479a638aa2c9e483e58ec6
          echo "::endgroup::"

      - name: Amalgamate jsoncpp
        shell: cmd
        run: |
          cd dvc\opensource\jsoncpp
          python amalgamate.py || echo "amalgamate.py failed — job will likely fail downstream"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Disable stdafx PCH in OWPML vcxprojs
        shell: bash
        run: |
          set -euo pipefail
          cd dvc/opensource/hwpx-owpml-model
          find . -name '*.vcxproj' -print0 | while IFS= read -r -d '' p; do
              if grep -q 'PrecompiledHeader' "$p"; then
                  sed -i \
                    -e 's|<PrecompiledHeader>Use</PrecompiledHeader>|<PrecompiledHeader>NotUsing</PrecompiledHeader>|g' \
                    -e 's|<PrecompiledHeader>Create</PrecompiledHeader>|<PrecompiledHeader>NotUsing</PrecompiledHeader>|g' \
                    "$p"
                  echo "patched: $p"
              fi
          done

      - name: Build pinned jsoncpp as static lib (upstream-canonical)
        shell: pwsh
        # Background: previous iterations installed jsoncpp through
        # vcpkg (dynamic x86-windows). Build succeeded, binary loaded,
        # no-args smoke printed "Hello World!" cleanly — but every
        # args-bearing invocation crashed with 0xC0000005 immediately
        # after entering `setCommand(argv)`, the place where DVCModel
        # first reaches into jsoncpp to parse spec.json. Classic signal
        # of ABI skew between the jsoncpp headers DVCModel compiled
        # against and the jsoncpp.dll it loaded at runtime.
        #
        # Upstream's `update_oss.bat` pins a specific jsoncpp commit
        # (8190e061bc2d95da37479a638aa2c9e483e58ec6) and expects a
        # static lib at `./opensource/jsoncpp/json_git/lib/Release/
        # jsoncpp.lib` — the DVCModel.vcxproj include/lib paths already
        # point there. We just need to actually run the build.
        run: |
          Push-Location dvc\opensource\jsoncpp
          cmake -G "Visual Studio 17 2022" -A Win32 -B json_git `
                -DJSONCPP_WITH_TESTS=OFF `
                -DBUILD_SHARED_LIBS=OFF `
                -DJSONCPP_STATIC_WINDOWS_RUNTIME=OFF
          cmake --build json_git --config Release --target jsoncpp_static
          # cmake_static_targets name varies across jsoncpp versions;
          # the pinned commit happens to emit `jsoncpp.lib` directly
          # at `json_git\lib\Release\jsoncpp.lib` (where the vcxproj
          # already looks), so no rename/copy is needed — just verify.
          # Copy only when we land a differently-named static lib.
          $target = (Resolve-Path -LiteralPath .).Path + '\json_git\lib\Release\jsoncpp.lib'
          New-Item -ItemType Directory -Force -Path 'json_git\lib\Release' | Out-Null
          if (Test-Path $target) {
            Write-Host "lib already at target: $target"
          } else {
            $src = Get-ChildItem -Path 'json_git' -Recurse -Filter '*.lib' |
              Where-Object { $_.Name -match 'jsoncpp' } |
              Select-Object -First 1
            if (-not $src) { throw "jsoncpp static lib not found after cmake build" }
            Write-Host "copying: $($src.FullName) -> $target"
            Copy-Item $src.FullName $target -Force
          }
          # Sanity: surface the lib file DVCModel.vcxproj will consume.
          Get-ChildItem 'json_git\lib\Release' | Select-Object Name, Length |
            Format-Table -AutoSize
          Pop-Location

      - name: Detect installed Windows SDK
        id: sdk
        shell: pwsh
        run: |
          $root = 'C:\Program Files (x86)\Windows Kits\10\Include'
          if (!(Test-Path $root)) { $root = 'C:\Program Files\Windows Kits\10\Include' }
          $versions = Get-ChildItem $root -Directory |
            Where-Object { $_.Name -match '^10\.' } |
            Sort-Object Name -Descending
          if ($null -eq $versions -or $versions.Count -eq 0) {
            throw "No Windows 10 SDK found under $root"
          }
          $ver = $versions[0].Name
          Write-Host "Using Windows SDK: $ver"
          "ver=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build DVCModel + ExampleWindows (x86 Release)
        shell: cmd
        run: |
          cd dvc
          msbuild DVCModel.sln ^
            /p:Configuration=Release ^
            /p:Platform=x86 ^
            /p:PlatformToolset=v143 ^
            /p:WindowsTargetPlatformVersion=${{ steps.sdk.outputs.ver }} ^
            /m /v:minimal

      - name: Inspect DLL dependency tree (dumpbin /dependents)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $dumpbin = & $vswhere -latest -find 'VC\Tools\MSVC\*\bin\Hostx64\x86\dumpbin.exe' | Select-Object -First 1
          if (-not $dumpbin -or -not (Test-Path $dumpbin)) {
            Write-Host "dumpbin not found; skipping dependency inspection"
            exit 0
          }
          Write-Host "dumpbin: $dumpbin"
          foreach ($t in @("dvc\Release\ExampleWindows.exe", "dvc\Release\DVCModel.dll")) {
            if (Test-Path $t) {
              Write-Host "::group::$t dependencies"
              & $dumpbin /dependents $t
              Write-Host "::endgroup::"
            }
          }

      - name: Inspect dvc\Release\ contents
        shell: pwsh
        # Static-linked jsoncpp → no runtime DLL staging needed. Just
        # sanity-check the build output.
        run: |
          if (-not (Test-Path "dvc\Release\ExampleWindows.exe")) {
            throw "Build didn't produce ExampleWindows.exe"
          }
          Write-Host "dvc\Release\ contents:"
          Get-ChildItem "dvc\Release\" | Select-Object Name, Length |
            Format-Table -AutoSize

      - name: Smoke-test ExampleWindows.exe (no args → prints Hello World)
        shell: cmd
        continue-on-error: true
        # A bare invocation should print "Hello World!" and exit — upstream
        # `ExampleWindows.cpp` does this unconditionally before CLI
        # processing. If this step produces no output we have a DLL-load
        # failure (process aborts before reaching main/wmain).
        run: |
          dvc\Release\ExampleWindows.exe
          echo exit_code=%errorlevel%

      - name: Publish binary artifact
        id: publish
        uses: actions/upload-artifact@v4
        with:
          name: dvc-windows-x86-${{ github.run_id }}
          path: |
            dvc/Release/*.exe
            dvc/Release/*.dll
          retention-days: 90
          if-no-files-found: error

      - name: Set artifact output
        shell: bash
        run: echo "artifact_name=dvc-windows-x86-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-logs-${{ github.run_id }}
          path: |
            dvc/**/*.log
            dvc/**/BuildLog.htm
          if-no-files-found: ignore

  parity:
    name: Run DVC against golden fixtures
    needs: build
    runs-on: windows-latest
    # Parity-diff may legitimately differ from our own expected.json
    # (that's the whole point of the comparison). Don't fail the job on
    # diffs — only on infrastructure / binary-invocation failures.
    steps:
      - name: Checkout polaris
        uses: actions/checkout@v4

      - name: Download DVC binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dvc-bin

      - name: List artifact contents
        shell: pwsh
        run: Get-ChildItem -Recurse dvc-bin | Select-Object FullName, Length

      - name: Single-fixture probe (cmd.exe, combined stream)
        shell: cmd
        # Smoke check #1 at the parity-job level — prior iterations
        # showed the bare smoke step (no args) prints "Hello World!"
        # cleanly under cmd.exe but *Start-Process* with args gave an
        # access-violation exit (0xC0000005) and empty stdout/stderr.
        # Reproduce the arg-bearing path here under cmd.exe first to
        # isolate whether the crash is invocation-mechanism-specific.
        continue-on-error: true
        run: |
          for /f "delims=" %%X in ('dir /b /s "dvc-bin\ExampleWindows.exe"') do set EXE=%%X
          echo using: %EXE%
          set DOC=testdata\golden\01_clean\doc.hwpx
          set SPEC=testdata\golden\01_clean\spec.json
          set OUT=testdata\golden\_dvc-output\01_clean.probe.json
          mkdir testdata\golden\_dvc-output 2>nul
          echo --- running with args ---
          "%EXE%" -j "--file=%OUT%" -t "%SPEC%" "%DOC%" > probe.stdout.txt 2> probe.stderr.txt
          echo exit_code=%errorlevel%
          echo --- probe.stdout.txt ---
          type probe.stdout.txt
          echo --- probe.stderr.txt ---
          type probe.stderr.txt
          if exist "%OUT%" (echo --- output file produced --- & type "%OUT%") else (echo no output file)

      - name: Run DVC against each golden fixture
        shell: pwsh
        # Per-invocation bookkeeping:
        #   - exit code captured via $LASTEXITCODE
        #   - combined stdout+stderr via `*>&1` so a crash between
        #     "Hello World!" print and buffer flush still captures
        #     anything the CRT wrote to stderr during teardown
        # Use `&` (call operator) instead of Start-Process — the prior
        # Start-Process variant crashed uniformly with 0xC0000005 on
        # every fixture and lost the "Hello World!" print; smoke test
        # under cmd.exe printed it fine. Leaving the invocation to
        # PowerShell's native process-spawning path avoids whatever
        # Start-Process was breaking.
        run: |
          $exeItem = Get-ChildItem -Path "dvc-bin" -Recurse -Filter "ExampleWindows.exe" | Select-Object -First 1
          if (-not $exeItem) { throw "ExampleWindows.exe not found under dvc-bin/" }
          $exe = $exeItem.FullName
          Write-Host "Using exe: $exe"
          $outDir = "testdata\golden\_dvc-output"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          $cases = Get-ChildItem "testdata\golden" -Directory |
            Where-Object { $_.Name -ne "_dvc-output" -and (Test-Path (Join-Path $_.FullName "doc.hwpx")) }
          Write-Host "Processing $($cases.Count) fixtures"
          foreach ($case in $cases) {
            $name = $case.Name
            $doc = Join-Path $case.FullName "doc.hwpx"
            $spec = Join-Path $case.FullName "spec.json"
            $out = Join-Path $outDir "$name.json"
            $log = Join-Path $outDir "$name.log"
            Write-Host "::group::$name"
            $combined = & $exe -j "--file=$out" -t $spec $doc 2>&1
            $rc = $LASTEXITCODE
            $combined | Out-File -FilePath $log -Encoding utf8
            Write-Host "exit_code=$rc"
            if ($combined) { Write-Host "--- output ---"; $combined | ForEach-Object { Write-Host $_ } }
            if (Test-Path $out) {
              Write-Host "--- output.json ---"
              Get-Content $out
            } else {
              Write-Host "(no output.json produced)"
            }
            Write-Host "::endgroup::"
          }

      - name: Soft-diff DVC output vs committed expected.json
        shell: bash
        continue-on-error: true
        run: |
          bash scripts/diff-dvc-outputs.sh testdata/golden testdata/golden/_dvc-output \
            | tee testdata/golden/_dvc-output/_diff-summary.txt

      - name: Upload DVC outputs + per-fixture logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dvc-parity-outputs-${{ github.run_id }}
          path: testdata/golden/_dvc-output/
          if-no-files-found: warn
