name: DVC parity (Windows)

# Builds upstream `hancom-io/dvc` on a Windows runner and runs the
# resulting ExampleWindows.exe against every fixture under
# `testdata/golden/`. Outputs are uploaded as artifacts and soft-diffed
# against our committed `expected.json` so we can see where polaris'
# engine diverges from DVC.exe without blocking the main CI pipeline.
#
# Manual-trigger (workflow_dispatch) + runs on pushes to main only.
# The first iterations are expected to fail at the build step — this is
# a research task, not a blocker.

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream hancom-io/dvc ref to build (branch/tag/SHA)"
        default: "main"
        required: false
  push:
    branches: [main]
    paths:
      - ".github/workflows/dvc-parity.yml"
      - "scripts/diff-dvc-outputs.sh"
      - "testdata/golden/**"

permissions:
  contents: read

jobs:
  parity:
    name: Build DVC.exe and diff against fixtures
    runs-on: windows-latest
    # Research job — we want the artifact upload to happen even when the
    # build or the diff surfaces divergences.
    continue-on-error: true
    env:
      UPSTREAM_REF: ${{ inputs.upstream_ref || 'main' }}
    steps:
      - name: Checkout polaris
        uses: actions/checkout@v4
        with:
          path: polaris

      - name: Checkout upstream hancom-io/dvc
        uses: actions/checkout@v4
        with:
          repository: hancom-io/dvc
          ref: ${{ env.UPSTREAM_REF }}
          path: dvc

      - name: Fetch OSS dependencies
        shell: bash
        # Replicates upstream `update_oss.bat` but clones the public repos
        # without an auth token (the bat wraps them with a PAT solely to
        # work around corporate network policies). Also fixes the bat's
        # bug where the jsoncpp reset is performed inside the rapidjson
        # directory.
        run: |
          set -euo pipefail
          cd dvc
          mkdir -p opensource
          cd opensource
          echo "::group::hwpx-owpml-model"
          git clone --depth 1 https://github.com/hancom-io/hwpx-owpml-model.git
          echo "::endgroup::"
          echo "::group::rapidjson"
          git clone https://github.com/Tencent/rapidjson.git
          git -C rapidjson reset --hard 8261c1ddf43f10de00fd8c9a67811d1486b2c784
          echo "::endgroup::"
          echo "::group::jsoncpp"
          git clone https://github.com/open-source-parsers/jsoncpp.git
          git -C jsoncpp reset --hard 8190e061bc2d95da37479a638aa2c9e483e58ec6
          echo "::endgroup::"

      - name: Amalgamate jsoncpp
        shell: cmd
        # jsoncpp's Visual Studio build path uses the amalgamated single
        # header + source produced by this python script. Do it here so
        # msbuild finds the files where the .vcxproj expects them.
        run: |
          cd dvc\opensource\jsoncpp
          python amalgamate.py || echo "amalgamate.py failed — job will likely fail downstream"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Disable stdafx PCH in OWPML vcxprojs only
        shell: bash
        # OWPML uses the v141-default `stdafx.h`/`stdafx.cpp` PCH pair
        # which v143 no longer auto-recognizes (it now defaults to
        # `pch.h`). Disable PCH only for those projects — DVCModel itself
        # uses `pch.h` correctly and stays untouched.
        run: |
          set -euo pipefail
          cd dvc/opensource/hwpx-owpml-model
          find . -name '*.vcxproj' -print0 | while IFS= read -r -d '' p; do
              if grep -q 'PrecompiledHeader' "$p"; then
                  sed -i \
                    -e 's|<PrecompiledHeader>Use</PrecompiledHeader>|<PrecompiledHeader>NotUsing</PrecompiledHeader>|g' \
                    -e 's|<PrecompiledHeader>Create</PrecompiledHeader>|<PrecompiledHeader>NotUsing</PrecompiledHeader>|g' \
                    "$p"
                  echo "patched: $p"
              fi
          done

      - name: Install jsoncpp via vcpkg + patch vcxproj paths
        shell: pwsh
        # Install jsoncpp at vcpkg's default location, then rewrite the
        # upstream DVCModel.vcxproj's Release|Win32 AdditionalInclude
        # Directories / AdditionalLibraryDirectories to point at that
        # install. Env var-based INCLUDE/LIB injection didn't survive
        # MSBuild's rebuild of its internal tool environment, so we
        # edit the vcxproj directly.
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) { $vcpkgRoot = 'C:\vcpkg' }
          & "$vcpkgRoot\vcpkg" install jsoncpp:x86-windows --recurse
          $pkg = "$vcpkgRoot\packages\jsoncpp_x86-windows"
          $include = Join-Path $pkg 'include'
          $includeJson = Join-Path $pkg 'include\json'
          $lib = Join-Path $pkg 'lib'
          Write-Host "include root: $include"
          Write-Host "include/json: $includeJson"
          Write-Host "lib root:     $lib"
          if (!(Test-Path $includeJson)) { throw "missing: $includeJson" }
          if (!(Test-Path $lib)) { throw "missing: $lib" }
          # Replace the upstream include path with BOTH `<pkg>/include`
          # and `<pkg>/include/json` — source files alternate between
          # `#include "json.h"` (needs the nested path) and
          # `#include "json/json.h"` (needs the parent).
          $bothInc = "$include;$includeJson"
          # NOTE: PowerShell's `-replace` regex REPLACEMENT string
          # treats `\` as literal — do NOT double-escape, or the
          # vcxproj ends up with broken paths like `C:\\vcpkg\\...`.
          # Only `$` needs escaping (via `$$`); Windows paths don't
          # contain `$` so a plain substitution is safe.
          $vcxproj = 'dvc\DVCModel.vcxproj'
          $text = Get-Content $vcxproj -Raw
          $text = $text -replace '\./opensource/vcpkg/packages/jsoncpp_x86-windows/include/json', $bothInc
          $text = $text -replace '\./opensource/vcpkg/packages/jsoncpp_x86-windows/lib', $lib
          # Defensive: Debug|Win32 flavor.
          $text = $text -replace '\./opensource/jsoncpp/include/json', $bothInc
          $text = $text -replace '\./opensource/jsoncpp/json_git/lib/Release', $lib
          Set-Content -Path $vcxproj -Value $text -NoNewline
          Write-Host "---patched vcxproj snippet---"
          Select-String -Path $vcxproj -Pattern 'AdditionalIncludeDirectories|AdditionalLibraryDirectories' |
            ForEach-Object { Write-Host "  $($_.Line.Trim())" }

      - name: Detect installed Windows SDK
        id: sdk
        shell: pwsh
        run: |
          $root = 'C:\Program Files (x86)\Windows Kits\10\Include'
          if (!(Test-Path $root)) { $root = 'C:\Program Files\Windows Kits\10\Include' }
          $versions = Get-ChildItem $root -Directory |
            Where-Object { $_.Name -match '^10\.' } |
            Sort-Object Name -Descending
          if ($null -eq $versions -or $versions.Count -eq 0) {
            throw "No Windows 10 SDK found under $root"
          }
          $ver = $versions[0].Name
          Write-Host "Using Windows SDK: $ver"
          "ver=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build DVCModel + ExampleWindows (x86 Release)
        shell: cmd
        # Platform=x86 (not x64) — upstream's x64 ItemDefinitionGroups
        # in hwpx-owpml-model's vcxprojs are incomplete (missing
        # AdditionalIncludeDirectories), so x64 builds fail with
        # "Cannot open include file: 'OWPMLUtil/HncDefine.h'" even
        # though the headers are on disk. The Win32 (aka x86 at
        # solution level) configurations carry `./;./../;./../Common/`
        # correctly. DVCModel.sln surfaces x86/x64 (not Win32);
        # MSBuild maps x86 → Win32 for the underlying vcxprojs.
        #
        # PlatformToolset: upstream pins v141 (VS2017); retarget to
        # v143 (VS2022) since v141 isn't on the runner.
        # WindowsTargetPlatformVersion: detected dynamically.
        run: |
          cd dvc
          msbuild DVCModel.sln ^
            /p:Configuration=Release ^
            /p:Platform=x86 ^
            /p:PlatformToolset=v143 ^
            /p:WindowsTargetPlatformVersion=${{ steps.sdk.outputs.ver }} ^
            /m /v:minimal

      - name: Locate ExampleWindows.exe
        id: find-exe
        shell: bash
        run: |
          set -eu
          exe=$(find dvc -type f -name 'ExampleWindows.exe' | head -1)
          echo "exe=$exe" >> "$GITHUB_OUTPUT"
          echo "Found: $exe"

      - name: Run DVC against each golden fixture
        shell: bash
        env:
          DVC_EXE: ${{ steps.find-exe.outputs.exe }}
        run: |
          set -u
          mkdir -p polaris/testdata/golden/_dvc-output
          for case in polaris/testdata/golden/*/; do
            name=$(basename "$case")
            [[ "$name" = "_dvc-output" ]] && continue
            [[ ! -f "$case/doc.hwpx" ]] && continue
            out="polaris/testdata/golden/_dvc-output/${name}.json"
            echo "::group::$name"
            "$DVC_EXE" -j -a \
              "--file=$out" \
              "-t" "$case/spec.json" \
              "$case/doc.hwpx" \
              || echo "DVC exited non-zero for $name (may be intentional per rule violations)"
            echo "---"
            if [[ -f "$out" ]]; then
              cat "$out"
            else
              echo "(no output file produced)"
            fi
            echo "::endgroup::"
          done

      - name: Soft-diff DVC output vs committed expected.json
        shell: bash
        run: |
          cd polaris
          bash scripts/diff-dvc-outputs.sh testdata/golden testdata/golden/_dvc-output \
            | tee testdata/golden/_dvc-output/_diff-summary.txt

      - name: Upload DVC outputs + diff summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dvc-parity-outputs-${{ github.run_id }}
          path: |
            polaris/testdata/golden/_dvc-output/
          if-no-files-found: warn

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-logs-${{ github.run_id }}
          path: |
            dvc/**/*.log
            dvc/**/BuildLog.htm
          if-no-files-found: ignore
