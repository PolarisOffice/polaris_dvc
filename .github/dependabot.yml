# Dependabot configuration for polaris_dvc.
#
# Watches two ecosystems:
#   1. cargo — the 5-crate workspace's direct dependencies.
#   2. github-actions — the workflow-pinned action versions.
#
# Weekly cadence (Monday morning KST) keeps PR noise low while still
# catching security advisories within a week of publication. GitHub
# also opens security-only PRs immediately regardless of schedule
# when a CVE affects the pinned version.
#
# Grouping: minor + patch updates of the same ecosystem are batched
# into one PR per week, so we don't get 8 separate "bump foo 1.2 ->
# 1.3" PRs. Major bumps stay individual — they usually need manual
# review anyway.

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "cargo"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Two 0.x crates we deliberately pin until we can dedicate a
    # migration PR to them. Both are semver-0.x, meaning every minor
    # bump (0.31 → 0.32, 0.6 → 0.7, …) is a breaking API change:
    #   - quick-xml: 0.32 reworked Reader into a builder pattern,
    #     0.36+ kept removing methods we use (trim_text,
    #     check_end_names, BytesText::unescape signature).
    #   - zip: 0.7+ introduced a FileOptionExtension generic that
    #     breaks our `FileOptions::default()` callsites.
    # Patches within the pinned minor (0.31.x, 0.6.x) still flow
    # through so security fixes aren't blocked — only the
    # breaking minor+major jumps are held back.
    ignore:
      - dependency-name: "quick-xml"
        versions:
          - ">= 0.32"
      - dependency-name: "zip"
        versions:
          - ">= 0.7"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
